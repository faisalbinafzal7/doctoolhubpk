<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Gradient Background -->
  <rect width="1200" height="630" fill="url(#paint0_linear)"/>
  
  <!-- Subtle Background Pattern -->
  <circle cx="1100" cy="100" r="150" fill="white" fill-opacity="0.05"/>
  <circle cx="100" cy="530" r="200" fill="white" fill-opacity="0.03"/>
  <path d="M0 630L400 330L800 630H0Z" fill="white" fill-opacity="0.02"/>
  <path d="M1200 0L800 300L400 0H1200Z" fill="white" fill-opacity="0.02"/>

  <!-- Centered Hero Icon Group -->
  <g transform="translate(600, 260)">
    <!-- Calendar Body -->
    <rect x="-80" y="-80" width="160" height="160" rx="24" fill="white"/>
    <rect x="-80" y="-80" width="160" height="40" rx="0" fill="#0ea5e9" clip-path="url(#calendar_top_radius)"/>
    
    <!-- Calendar Details -->
    <circle cx="-35" cy="-60" r="6" fill="white" fill-opacity="0.5"/>
    <circle cx="35" cy="-60" r="6" fill="white" fill-opacity="0.5"/>
    
    <rect x="-50" y="-10" width="100" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="-50" y="15" width="100" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="-50" y="40" width="60" height="10" rx="5" fill="#e2e8f0"/>

    <!-- Clock Overlay (bottom right) -->
    <circle cx="60" cy="60" r="50" fill="#0ea5e9" stroke="white" stroke-width="8"/>
    <path d="M60 30V60H80" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title Text -->
  <text x="600" y="480" text-anchor="middle" fill="white" style="font-family: 'Inter', sans-serif; font-weight: 900; font-size: 80px; letter-spacing: -0.05em; transform: scaleX(0.85); transform-origin: center;">
    AGE CALCULATOR
  </text>
  
  <!-- Subtitle Text -->
  <text x="600" y="540" text-anchor="middle" fill="white" fill-opacity="0.8" style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 20px; letter-spacing: 0.2em; text-transform: uppercase;">
    PRECISION TRACKING
  </text>

  <!-- Branding Badge -->
  <rect x="510" y="50" width="180" height="40" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2"/>
  <text x="600" y="77" text-anchor="middle" fill="white" style="font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 16px;">
    DocToolHubPK
  </text>

  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <clipPath id="calendar_top_radius">
      <rect x="-80" y="-80" width="160" height="160" rx="24"/>
    </clipPath>
  </defs>
</svg>
