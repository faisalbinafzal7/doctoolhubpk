<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Indigo/Violet Gradient Background -->
  <rect width="1200" height="630" fill="url(#paint0_linear)"/>
  
  <!-- Content Pattern -->
  <rect x="50" y="50" width="1100" height="10" rx="5" fill="white" fill-opacity="0.05"/>
  <rect x="50" y="80" width="800" height="10" rx="5" fill="white" fill-opacity="0.03"/>
  <rect x="50" y="550" width="1100" height="10" rx="5" fill="white" fill-opacity="0.05"/>
  <rect x="350" y="580" width="800" height="10" rx="5" fill="white" fill-opacity="0.03"/>

  <!-- Main Visual: Text Document Icon -->
  <g transform="translate(600, 260)">
    <!-- Paper Sheet -->
    <rect x="-80" y="-100" width="160" height="200" rx="12" fill="white"/>
    <path d="M40 -100L80 -60V-100H40Z" fill="#8b5cf6" fill-opacity="0.2"/>
    
    <!-- Text Lines -->
    <rect x="-50" y="-50" width="100" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="-50" y="-25" width="100" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="-50" y="0" width="100" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="-50" y="25" width="100" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="-50" y="50" width="60" height="8" rx="4" fill="#8b5cf6" fill-opacity="0.5"/>
  </g>

  <!-- Title Text -->
  <text x="600" y="480" text-anchor="middle" fill="white" style="font-family: 'Inter', sans-serif; font-weight: 900; font-size: 72px; letter-spacing: -0.04em;">
    LOREM IPSUM
  </text>
  
  <!-- Subtitle Text -->
  <text x="600" y="540" text-anchor="middle" fill="white" fill-opacity="0.8" style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 22px; letter-spacing: 0.15em; text-transform: uppercase;">
    Professional Placeholder Generator
  </text>

  <!-- Branding Badge -->
  <rect x="510" y="50" width="180" height="40" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2"/>
  <text x="600" y="77" text-anchor="middle" fill="white" style="font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px;">
    DocToolHubPK
  </text>

  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
</svg>
